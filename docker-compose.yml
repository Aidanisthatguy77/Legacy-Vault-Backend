# Docker Compose - NBA 2K Legacy Vault
# Run with: docker compose up

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: vault_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build: ./backend
    container_name: vault_backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=vault_legacy
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-A@070610}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
    depends_on:
      mongo:
        condition: service_healthy

  # Frontend React App
  frontend:
    build: ./admin-frontend
    container_name: vault_admin
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend

volumes:
  mongo_data: