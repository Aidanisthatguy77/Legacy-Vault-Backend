# Docker Compose - NBA 2K Legacy Vault (Cloud-Ready)
# 
# IMPORTANT: This expects MongoDB Atlas connection string in MONGO_URL
# Run: docker compose up
#
# No local MongoDB needed - connects to your Atlas cluster in the cloud!

services:
  # Backend API (FastAPI)
  backend:
    build: ./backend
    container_name: vault_backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME:-vault_legacy}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-A@070610}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Frontend React App
  frontend:
    build: ./admin-frontend
    container_name: vault_admin
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=${BACKEND_URL:-http://localhost:8001}
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: vault_network
