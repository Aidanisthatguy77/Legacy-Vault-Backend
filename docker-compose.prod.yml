# Production Docker Compose - NBA 2K Legacy Vault
# Everything runs together - MongoDB + Backend + Frontend
# Run with: docker compose -f docker-compose.prod.yml up

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: vault_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI) + Frontend Served Together
  app:
    build: ./prod
    container_name: vault_app
    restart: always
    ports:
      - "8001:8001"    # API
      - "3000:3000"    # Frontend
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=vault_legacy
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-A@070610}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - CORS_ORIGINS=*
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data: