# Production Docker Compose - NBA 2K Legacy Vault
# 
# Deploys to any cloud: AWS, GCP, Azure, DigitalOcean, Railway, etc.
# Uses MongoDB Atlas (cloud database) - nothing local!
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:
  # Combined Backend + Frontend
  app:
    build: ./backend
    container_name: vault_app
    ports:
      - "8001:8001"    # API
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME:-vault_legacy}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-A@070610}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - vault

networks:
  vault:
    name: vault_network
